name: Supabase Types Sync

# Supabase の DB スキーマから TypeScript 型を生成し、変更があれば
# claude/sync-types-* ブランチに push する。
# その後 merge-to-main.yml が自動で main にマージし、Cloudflare が再ビルドする。

on:
  schedule:
    # 毎日 00:00 UTC(日本時間 09:00)に実行
    - cron: "0 0 * * *"
  workflow_dispatch:
    # 手動実行(スキーマ変更後すぐ反映したい時用)

permissions:
  contents: write

jobs:
  generate-types:
    name: Generate Supabase types
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AUTO_MERGE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate types from Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          mkdir -p types
          supabase gen types typescript \
            --project-id "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --schema public \
            > types/supabase.ts

      - name: Detect changes
        id: detect
        run: |
          if git diff --quiet types/supabase.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Supabase types are up-to-date. No commit needed."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git identity
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push to claude/sync-types-* branch
        if: steps.detect.outputs.changed == 'true'
        run: |
          BRANCH="claude/sync-types-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add types/supabase.ts
          git commit -m "chore: Supabase の型定義を再生成"
          git push origin "$BRANCH"
          echo "::notice::Pushed updated types to $BRANCH. merge-to-main.yml will pick it up."
