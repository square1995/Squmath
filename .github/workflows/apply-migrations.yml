name: Apply Supabase Migrations

# main ブランチに新しい migration ファイルがマージされたら、
# 本番 Supabase に自動で `supabase db push` で適用する。
#
# 完了後、Supabase Types Sync を自動でトリガーして TypeScript 型も即時更新する。

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"

permissions:
  contents: read
  actions: write   # sync-supabase-types.yml をトリガーするため

jobs:
  apply:
    name: supabase db push to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Apply pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # baseline 等で「remote 側が applied 状態」のものはスキップされる。
          # 未適用の migration だけが本番に流れる。
          supabase db push

      - name: Trigger types sync
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run sync-supabase-types.yml --ref main \
            --repo "${{ github.repository }}" || true
          echo "::notice::Triggered Supabase Types Sync to refresh TypeScript types."
