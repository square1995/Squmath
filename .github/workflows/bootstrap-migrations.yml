name: Bootstrap Supabase Migrations

# 既存の本番スキーマを supabase/migrations/ にベースライン migration として
# 取り込むためのワークフロー。
#
# - 初回 1 回だけ手動実行する想定(workflow_dispatch)
# - すでに migration ファイルがある場合は誤実行を防ぐためアボートする
# - `supabase db pull` 自身が remote の migration history に applied として記録するので、
#   別途 `supabase migration repair` を呼ぶ必要は無い

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    name: Pull baseline schema as migration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AUTO_MERGE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Abort if migrations already exist
        run: |
          set -e
          # .gitkeep 以外のファイルが 1 つでもあれば中止
          if find supabase/migrations -mindepth 1 -maxdepth 1 -type f ! -name '.gitkeep' | grep -q .; then
            echo "::error::supabase/migrations/ にすでにファイルがあります。bootstrap はスキップします。"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Revert orphan migration entries from previous failed bootstraps
        # 以前の bootstrap で db pull は走ったが commit が漏れていたケースに対応。
        # remote の migration_history に applied 記録だけが残っていると、後段の db push が
        # 「このバージョンは既に適用済み」と誤認するため、ここで revert で掃除する。
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -e
          # local に存在しない applied migration を抽出して revert する
          # supabase migration list の出力例:
          #   Local | Remote      | Time (UTC)
          #   ------|-------------|---------------------
          #         | 20260430173216 | 2026-04-30 17:32:16
          REMOTE_ORPHANS=$(supabase migration list --linked 2>/dev/null \
            | awk -F'|' 'NR>2 && $1 ~ /^[[:space:]]*$/ && $2 ~ /[0-9]+/ { gsub(/[[:space:]]/, "", $2); print $2 }' \
            || true)
          if [ -n "$REMOTE_ORPHANS" ]; then
            echo "Found orphan migrations on remote:"
            echo "$REMOTE_ORPHANS"
            for VERSION in $REMOTE_ORPHANS; do
              echo "Reverting orphan: $VERSION"
              supabase migration repair --status reverted "$VERSION" || true
            done
          else
            echo "No orphan migrations on remote."
          fi

      - name: Pull remote schema as baseline migration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db pull --schema public

      - name: Detect changes (untracked files included)
        id: detect
        run: |
          # `git diff --quiet` は untracked ファイルを見落とすバグを踏むため、
          # 実体ファイルを find で確認する。
          if find supabase/migrations -mindepth 1 -maxdepth 1 -type f ! -name '.gitkeep' | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::baseline migration を検出しました。コミット & push します。"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::supabase db pull は走ったが新しい migration ファイルが見当たりません。"
          fi

      - name: Configure git identity
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        if: steps.detect.outputs.changed == 'true'
        run: |
          set -e
          BRANCH="claude/bootstrap-migrations-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add supabase/migrations/
          git commit -m "chore: 既存スキーマをベースライン migration として取り込み"
          git push origin "$BRANCH"
          echo "::notice::Pushed baseline migration to $BRANCH. merge-to-main.yml will pick it up."
