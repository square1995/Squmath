name: TypeCheck

# main と claude/** へ push されたとき、PR が main 向けに作られたときに、
# TypeScript の型チェックを走らせて壊れていないか確認する。
# 本番デプロイ自体は Cloudflare Pages の GitHub 連携で別途行われる。

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Type check
        run: npm run typecheck
